name: vibe_app
description: "A new Flutter project for Vibe."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # --- Routing ---
  go_router: ^17.1.0

  # --- UI ---
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  simple_animations: ^5.0.2

  # --- State Management (Riverpod) ---
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # --- Local Cache (SQLite) ---
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.0.1+2
  path: ^1.9.1

  # --- Secure Storage ---
  flutter_secure_storage: ^9.2.4

  # --- Network ---
  http: ^1.4.0

  # --- Image Picker ---
  image_picker: ^1.1.2

  # --- Utilities ---
  shared_preferences: ^2.5.3
  mime: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # --- Testing ---
  mockito: ^5.4.4

  # --- Code Generation ---
  build_runner: ^2.6.0
  go_router_builder: ^4.0.1
  riverpod_generator: ^3.0.0

  # --- Linting ---
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/