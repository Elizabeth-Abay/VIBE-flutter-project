name: vibe_app
description: "A new Flutter project for Vibe."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0 
  simple_animations: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Standard for modern Flutter projects
  build_runner: ^2.6.0
  go_router_builder: ^4.0.1

flutter:
  uses-material-design: true

  # Assets must be indented correctly under the flutter section
  assets:
    - assets/images/
    # If you have specific profile or placeholder images, ensure they are in this folder